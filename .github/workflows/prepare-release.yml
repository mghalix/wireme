name: Prepare release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer bump to prepare
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      date:
        description: Release date in YYYY-MM-DD format; defaults to today
        required: false
        type: string

permissions: {}

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Open release pull request
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: release-automation

    steps:
      - name: Create short-lived release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.release-token.outputs.token }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.18"
          enable-cache: false

      - name: Install Python
        run: uv python install 3.13

      - name: Verify release lane is empty
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          set -euo pipefail

          open_release_pr="$(
            gh pr list \
              --state open \
              --json headRefName \
              --jq '[.[] | select(.headRefName | startswith("release/"))] | length'
          )"
          draft_release="$(
            gh release list \
              --limit 100 \
              --json isDraft \
              --jq '[.[] | select(.isDraft)] | length'
          )"

          if [[ "${open_release_pr}" != "0" ]]; then
            echo "An open release pull request already exists"
            exit 1
          fi

          if [[ "${draft_release}" != "0" ]]; then
            echo "A draft release already awaits publication"
            exit 1
          fi

      - name: Prepare release metadata
        id: release-details
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
          RELEASE_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail

          arguments=(prepare "${RELEASE_BUMP}")
          if [[ -n "${RELEASE_DATE}" ]]; then
            arguments+=(--date "${RELEASE_DATE}")
          fi

          uv run python scripts/release.py "${arguments[@]}"
          uv lock --check
          tag="$(uv run python scripts/release.py release-tag)"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Open release pull request
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          RELEASE_TAG: ${{ steps.release-details.outputs.tag }}
        run: |
          set -euo pipefail

          branch="release/${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git diff --check
          git switch -c "${branch}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- CHANGELOG.md pyproject.toml uv.lock
          git diff --cached --check
          git commit -m "chore(release): ${RELEASE_TAG}"

          gh auth setup-git
          git push --set-upstream origin "${branch}"
          gh pr create \
            --base "${DEFAULT_BRANCH}" \
            --head "${branch}" \
            --title "chore(release): ${RELEASE_TAG}" \
            --body "Prepare ${RELEASE_TAG}. Review the version and changelog; merge only after CI passes."
