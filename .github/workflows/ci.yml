name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: Core - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install core dependencies without extras
        run: >
          uv sync
          --locked
          --all-groups
          --python ${{ matrix.python-version }}

      - name: Run core tests
        run: >
          uv run
          --python ${{ matrix.python-version }}
          pytest tests/unit

  fastapi:
    name: FastAPI - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install all dependencies
        run: >
          uv sync
          --locked
          --all-extras
          --all-groups
          --python ${{ matrix.python-version }}

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Run all tests with coverage
        run: >
          uv run pytest
          tests/unit
          tests/integration
          --cov=wireme
          --cov-report=term-missing

      - name: Run examples
        run: |
          for example in examples/*.py; do
            echo "== ${example}"
            uv run python "${example}"
          done

  smoke:
    name: Artifact smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build distributions
        run: uv build --no-sources

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Smoke test the wheel
        run: ./scripts/smoke "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"

      - name: Smoke test the sdist
        run: ./scripts/smoke "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
