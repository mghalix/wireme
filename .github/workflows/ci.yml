name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: >
          uv sync
          --locked
          --all-groups
          --python ${{ matrix.python-version }}

      - name: Check formatting
        run: >
          uv run
          --python ${{ matrix.python-version }}
          ruff format --check .

      - name: Lint
        run: >
          uv run
          --python ${{ matrix.python-version }}
          ruff check .

      - name: Type check
        run: >
          uv run
          --python ${{ matrix.python-version }}
          basedpyright

      - name: Test
        run: >
          uv run
          --python ${{ matrix.python-version }}
          pytest --cov=wireme --cov-report=term-missing

      - name: Run examples
        shell: bash
        run: |
          set -euo pipefail

          for example in examples/*.py; do
            echo "Running ${example}"
            uv run --python ${{ matrix.python-version }} "$example"
          done
